apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: nemotron-3-nano
  annotations:
    scenarios.ai.sap.com/description: "NIVIDIA Nemotron 3 Nano model scenario"
    scenarios.ai.sap.com/name: "nemotron-3-nano-model"
    executables.ai.sap.com/description: "NIVIDIA Nemotron 3 Nano GPU Serving executable"
    executables.ai.sap.com/name: "nemotron-3-nano-executable"
  labels:
    scenarios.ai.sap.com/id: "nem-3-nan"
    ai.sap.com/version: "1.0.0"
spec:
  inputs:
    artifacts:
    - name: modelArtifact
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      labels: |
        ai.sap.com/resourcePlan: infer.s
    spec:
      predictor:
        containers:
          - name: kfserving-container
            image: alebiagi/nemotron-3-nano:latest
            env:
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: huggingface-secret
                    key: token
              - name: HF_HOME
                value: /models
            volumeMounts:
              - name: hf-cache
                mountPath: /models
            ports:
              - containerPort: 8080
        volumes:
          - name: hf-cache
            emptyDir: {} 
        resources:
          limits:
            nvidia.com/gpu: 1